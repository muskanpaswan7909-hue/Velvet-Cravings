<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - Velvet Cravings</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

<header>
    <h1 class="logo">VELVET CRAVINGS</h1>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <nav id="nav-menu">
        <a href="index.html"><span class="nav-icon">🏠</span>Home</a>
        <a href="cakes.html"><span class="nav-icon">🎂</span>Cakes</a>
        <a href="pastries.html"><span class="nav-icon">🧁</span>Pastries</a>
        <a href="childs-corner.html"><span class="nav-icon">🧸</span>Child's Corner</a>
        <a href="order.html"><span class="nav-icon">📝</span>Checkout</a>
        <a href="track-order.html"><span class="nav-icon">📍</span>Track</a>
        <a href="about.html"><span class="nav-icon">⭐</span>About</a>
    </nav>
</header>

<div style="min-height: 50vh;">
    <h2 class="title">Track Your Order</h2>
    
    <div class="form-container">
        <form id="trackForm" style="margin-top: 0;">
            <label for="orderId">Enter Mobile Number</label>
            <input type="text" id="orderId" placeholder="Enter Registration Mobile Number" required pattern="[0-9]{10}">
            <button type="submit" class="btn">Track Order</button>
            <p id="result" style="font-weight: bold; margin-top: 20px; color: #d63384; font-size: 18px; text-align: center;"></p>
        </form>
    </div>
</div>

<footer>
    <p>&copy; 2026 Velvet Cravings. All rights reserved.</p>
</footer>

<script src="cart.js"></script>
<script>
    function toggleMenu() {
        const nav = document.getElementById('nav-menu');
        nav.classList.toggle('show');
    }

    gsap.from(".form-container", { y: 50, opacity: 0, duration: 1, ease: "power3.out" });

    document.getElementById('trackForm').addEventListener('submit', function(e){
        e.preventDefault();
        const phone = document.getElementById('orderId').value.trim();
        const btn = document.querySelector('#trackForm button');
        
        document.getElementById('result').innerHTML = `<p style="color:#666;">Checking database...</p>`;
        btn.innerText = "Tracking...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append('phone', phone);
        
        fetch('track_order.php', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                const badgeColor = data.order_status == 'Pending' ? '#ff9800' : (data.order_status == 'Completed' ? '#28a745' : '#dc3545');
                document.getElementById('result').innerHTML = `
                    <div style="background: #fff; padding: 20px; border-radius: 10px; margin-top: 20px; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                        <h3 style="color:#d63384; margin-bottom: 10px;">Order Details Found!</h3>
                        <p style="margin: 5px 0; color: #555; text-align: left;"><strong>Item(s):</strong> ${data.product}</p>
                        <p style="margin: 5px 0; color: #555; text-align: left;"><strong>Date:</strong> ${data.date}</p>
                        <p style="margin-top: 15px; font-size: 18px;">
                            <strong>Current Status:</strong> <span style="background: ${badgeColor}; color: white; padding: 5px 12px; border-radius: 5px; display: inline-block;">${data.order_status}</span>
                        </p>
                    </div>
                `;
            } else {
                document.getElementById('result').innerHTML = `<p style="color:red; font-size: 16px;">❌ ${data.message}</p>`;
            }
        })
        .catch(error => {
            document.getElementById('result').innerHTML = `<p style="color:red; font-size: 16px;">Server Error. Try again.</p>`;
        })
        .finally(() => {
            btn.innerText = "Track Order";
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
